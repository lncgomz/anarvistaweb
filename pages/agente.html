<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta http-equiv=“Pragma” content=”no-cache”>
  <meta http-equiv=“Expires” content=”-1″>
  <meta http-equiv=“CACHE-CONTROL” content=”NO-CACHE”>
  <script src="../js/aframe.min.js"></script>
  <script src="../js/aframe-ar.js"></script>
  <script src="../js/aframe-particle-system-component.js"></script>
</head>
<link rel="stylesheet" href="../css/cus.css" />
<link rel="stylesheet" href="../css/customFonts.css" />
<script src="https://kit.fontawesome.com/a927a7050d.js" crossorigin="anonymous"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet"
  integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous" />
<script src="../customJs/control.js"></script>
<script>
  // Handle marker found/lost events
  document.addEventListener('DOMContentLoaded', function() {
    const marker = document.querySelector('a-marker');
    const header = document.querySelector('header');
    const footer = document.querySelector('footer');
    const scanIndicator = document.getElementById('scan-indicator');
    
    if (marker) {
      marker.addEventListener('markerFound', function() {
        console.log('Marker found');
        if (header) header.classList.add('visible');
        // Footer always visible
        if (scanIndicator) scanIndicator.classList.remove('visible');
      });
      
      marker.addEventListener('markerLost', function() {
        console.log('Marker lost');
        if (header) header.classList.remove('visible');
        // Footer always visible
        if (scanIndicator) scanIndicator.classList.add('visible');
      });
    }
  });
</script>

<body style="margin: 0px; overflow: hidden;" onload="retrieveLinks()">
  <span id="links" hidden></span>

  <header class="header">
    <div class="header-content">
      <div class="song-info">
        <i class="fas fa-music"></i>
        <span class="song-text songText"></span>
      </div>
      <div>
        <h2 class="project-name legendText"></h2>
      </div>
    </div>
  </header>

  <div id="scan-indicator" class="scan-indicator visible">
    <div class="scan-message">Escanea el código AR</div>
    <div class="scan-square"></div>
  </div>

  <a-scene embedded vr-mode-ui="enabled: false;"
    arjs='debugUIEnabled: false; sourceType: webcam; sourceWidth:640; sourceHeight:480; displayWidth: 640; displayHeight: 480; '>
    <a-assets>
      <a-asset-item id="agente" src="../models/agente.gltf"></a-asset-item>
      <audio id="agenteAudio" src="../audio/inanicion.mp3" preload="auto"></audio>
    </a-assets>

    <a-marker id="agente" type="pattern" url="../data/agente.patt" smoothCount=0 smoothTolerance=0.0001 registerevents>
      <a-entity position="0 0 0" particle-system="
        texture: ../images/particles/agente.png;
        color: #000000, #FFFFFF;
        size: 1, 0;
        velocityValue: 0.007 0.005 0.003;
        velocitySpread: 0.7 0 0.3;
        accelerationValue: 0.003 0.005 0.007;
        accelerationSpread: 0.005 0.005 0.005;
        rotationAngle: 0;
        blending: 1;
        particleCount: 200;
        maxAge: 5;"></a-entity>
      <a-entity position="0 1 0" rotation="0 0 0" scale="0.05 0.05 0.05" gltf-model="#agente"
        animation="property: rotation; to: 0 -360 0; loop: true; dur: 2500"
        sound="src: #agenteAudio; autoplay: false; loop: false"></a-entity>
    </a-marker>
    <a-entity camera position="0 0 0"></a-entity>
  </a-scene>

  <footer class="footer">
    <div class="social-icons">
       <button id="facebookBtn" hidden="true">
        <i class="fa fa-brands fa-facebook"></i>
      </button>
      <button id="instagramBtn" hidden="true">
        <i class="fa fa-brands fa-instagram"></i>
      </button>
      <button id="threadsBtn" hidden="true">
        <i class="fa fa-brands fa-threads"></i>
      </button>
      <button id="youtubeBtn" hidden="true">
        <i class="fa fa-brands fa-youtube"></i>
      </button>
      <button id="archiveBtn" hidden="true">
        <i class="fa fa-solid fa-book-open-reader"></i>
      </button>
      <button id="bandcampBtn" hidden="true">
        <i class="fa fa-brands fa-bandcamp"></i>
      </button>
      <button id="spotifyBtn" hidden="true">
        <i class="fa fa-brands fa-spotify"></i>
      </button>
      <button id="locationBtn" hidden="true">
        <i class="fa fa-solid fa-map-location"></i>
      </button>
      <button id="webBtn" hidden="true">
        <i class="fa fa-solid fa-globe"></i>
      </button>
      <button id="webBtn" hidden="true">
        <i class="fa fa-solid fa-globe"></i>
      </button>
      <button id="galleryBtn" onclick="location.href='../gallery.html'">
        <i class="fa fa-solid fa-arrow-left"></i>
      </button>
      <button id="aboutBtn" onclick="location.href='../about.html'">
        <i class="fa fa-solid fa-info"></i>
      </button>
    </div>
  </footer>
</body>
</html>
